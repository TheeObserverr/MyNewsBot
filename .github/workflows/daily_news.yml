name: Daily News Bot

on:
  schedule:
    - cron: "0 7 * * *"  # 7:00 AM UTC — adjust to your timezone
  workflow_dispatch:       # Allows manual trigger from GitHub UI

permissions:
  contents: write          # Needed to commit config/seen changes back

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch and send news
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --mode fetch

      - name: Listen for commands (2 min window)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py --mode listen --listen-duration 120

      - name: Commit updated config and seen articles
        run: |
          git config user.name "News Bot"
          git config user.email "newsbot@users.noreply.github.com"
          git add config.json seen_articles.json
          git diff --staged --quiet || (git commit -m "chore: update seen articles and config [skip ci]" && git push)
